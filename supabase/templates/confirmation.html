<h2>Подтверждение входа в Photo Sorter</h2>

<p>Нажмите на кнопку ниже, чтобы подтвердить адрес и завершить вход.</p>

<p>
  <a
    href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email&redirect_to={{ .RedirectTo }}"
  >
    Подтвердить и войти
  </a>
</p>

<p>Если вы не запрашивали вход, просто проигнорируйте это письмо.</p>
